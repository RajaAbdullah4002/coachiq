name: CoachIQ CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: coachiqregistry.azurecr.io
          username: coachiqregistry
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: coachiqregistry.azurecr.io/coachiq-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: coachiqregistry.azurecr.io/coachiq-frontend:latest

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Azure
        run: |
          az webapp config container set \
            --name coachiq-backend \
            --resource-group coachiq-rg \
            --container-image-name coachiqregistry.azurecr.io/coachiq-backend:latest
          az webapp restart --name coachiq-backend --resource-group coachiq-rg

      - name: Deploy frontend to Azure
        run: |
          az webapp config container set \
            --name coachiq-frontend \
            --resource-group coachiq-rg \
            --container-image-name coachiqregistry.azurecr.io/coachiq-frontend:latest
          az webapp restart --name coachiq-frontend --resource-group coachiq-rg