name: CoachIQ CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: coachiqregistry.azurecr.io
          username: coachiqregistry
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: coachiqregistry.azurecr.io/coachiq-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: coachiqregistry.azurecr.io/coachiq-frontend:latest

      - name: Deploy backend to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: coachiq-backend
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          images: coachiqregistry.azurecr.io/coachiq-backend:latest

      - name: Deploy frontend to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: coachiq-frontend
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          images: coachiqregistry.azurecr.io/coachiq-frontend:latest